# =============================================================================
# Docker Compose - Local Development (hot reload)
# =============================================================================
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: engage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-engage}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-engage_dev_password}
      POSTGRES_DB: ${DB_NAME:-engage_dev}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-engage} -d ${DB_NAME:-engage_dev}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - engage-network

  redis:
    image: redis:7-alpine
    container_name: engage-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - engage-network

  backend:
    image: node:20-alpine
    container_name: engage-backend-dev
    working_dir: /app
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-engage}:${DB_PASSWORD:-engage_dev_password}@postgres:5432/${DB_NAME:-engage_dev}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      FRONTEND_URL: http://localhost:5173
      LOG_LEVEL: debug
    volumes:
      - ./:/app
      - engage_root_node_modules:/app/node_modules
      - engage_backend_node_modules:/app/backend/node_modules
      - engage_shared_node_modules:/app/shared/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -lc "npm ci &&
              cd backend && npx prisma generate &&
              cd .. && npm run dev:backend"
    networks:
      - engage-network

  frontend:
    image: node:20-alpine
    container_name: engage-frontend-dev
    working_dir: /app
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_APP_ENV: development
    volumes:
      - ./:/app
      - engage_root_node_modules:/app/node_modules
      - engage_frontend_node_modules:/app/frontend/node_modules
      - engage_shared_node_modules:/app/shared/node_modules
    depends_on:
      - backend
    command: >
      sh -lc "npm ci && npm run dev:frontend"
    networks:
      - engage-network

  # Database GUI - Adminer
  adminer:
    image: adminer:latest
    container_name: engage-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    depends_on:
      - postgres
    networks:
      - engage-network

  # Redis GUI - Redis Commander
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: engage-redis-commander
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - engage-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  engage_root_node_modules:
    driver: local
  engage_backend_node_modules:
    driver: local
  engage_frontend_node_modules:
    driver: local
  engage_shared_node_modules:
    driver: local

networks:
  engage-network:
    driver: bridge
