[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[build.args]
CACHE_BUST = "202603032050"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.env]
NODE_ENV = "production"
PORT = "3001"
