# Gitleaks config — extends the default ruleset, plus repo-specific allowlist.
title = "Engage gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Ephemeral e2e test artifacts — gitignored, not real credentials. The tokens in e2e-tests/.tmp-cookies.txt are short-lived Playwright session cookies for a test tenant, accidentally committed once (9b8aac9) and removed in 68d72cc; they remain in branch history only."
paths = [
  '''e2e-tests/\.tmp-cookies\.txt''',
]
