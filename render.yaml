# Render Blueprint for Engage by Capstone
# Deploy: https://dashboard.render.com/select-repo?type=blueprint
# FREE TIER - Sleeps after 15 min inactivity, wakes on request

services:
  # Backend API Service (Free Tier - Auto-sleep to prevent costs)
  - type: web
    name: engage-backend
    runtime: node
    plan: free
    buildCommand: |
      npm install &&
      cd backend && npx prisma generate && npx prisma -v
    startCommand: cd backend && npm start
    healthCheckPath: /ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: engage-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://engage-frontend-0g6u.onrender.com
      - key: API_URL
        value: https://engage-backend-e1ue.onrender.com
      - key: EMAIL_PROVIDER
        value: smtp
      - key: SMTP_HOST
        value: smtp.123-reg.co.uk
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM_NAME
        value: Engage by Capstone
      - key: EMAIL_FROM_ADDRESS
        value: sales@capstonesoftware.co.uk
      - key: MAX_FILE_SIZE
        value: '10485760'
      - key: UPLOAD_DIR
        value: uploads
      - key: COMPANIES_HOUSE_API_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
    autoDeploy: true

  # Frontend Static Site
  - type: web
    name: engage-frontend
    runtime: static
    rootDir: frontend
    buildCommand: rm -rf dist node_modules/.vite node_modules/.cache && npm install --include=dev && npm run build 2>&1 && echo "Build complete" && ls -la dist/
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://engage-backend-e1ue.onrender.com
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: engage-db
    plan: free
    databaseName: engage_production
    user: engage_user

