# Render Blueprint for Engage by Capstone
# Deploy: https://dashboard.render.com/select-repo?type=blueprint
# Starter tier — no cold sleep, persistent disk for uploads/signatures

services:
  # Backend API Service
  - type: web
    name: engage-backend
    runtime: node
    plan: starter
    disk:
      name: engage-uploads
      mountPath: /var/data
      sizeGB: 10
    buildCommand: |
      npm ci &&
      npm run build:shared &&
      npm run build:backend
    # npm start runs start-prod.mjs which handles prisma migrate deploy automatically
    startCommand: cd backend && npm start
    healthCheckPath: /ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: engage-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://capstonesoftware.co.uk/engage
      - key: AUTH_COOKIE_PATH
        value: /engage
      - key: DEFAULT_TENANT_SUBDOMAIN
        value: demo
      - key: API_URL
        value: https://engage-backend-e1ue.onrender.com
      - key: EMAIL_WORKER_URL
        sync: false
      - key: EMAIL_WORKER_SECRET
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_EMAIL_API_TOKEN
        sync: false
      - key: CLOUDFLARE_EMAIL_WEBHOOK_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: OAUTH_STATE_SECRET
        sync: false
      - key: EMAIL_PLATFORM_FROM
        value: proposals@capstonesoftware.co.uk
      - key: EMAIL_PLATFORM_FROM_NAME
        value: Engage by Capstone
      - key: EMAIL_DEFAULT_REPLY_TO_FALLBACK
        value: support@capstonesoftware.co.uk
      - key: SMTP_HOST
        value: smtp.123-reg.co.uk
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM_NAME
        value: Engage by Capstone
      - key: EMAIL_FROM_ADDRESS
        value: sales@capstonesoftware.co.uk
      - key: MAX_FILE_SIZE
        value: '10485760'
      - key: UPLOAD_DIR
        value: uploads
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: COMPANIES_HOUSE_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL
        value: grok-3-mini
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: XERO_CLIENT_ID
        sync: false
      - key: XERO_CLIENT_SECRET
        sync: false
      - key: XERO_REDIRECT_URI
        value: https://capstonesoftware.co.uk/engage/api/oauth/callback/xero
    autoDeploy: true

  # Frontend Static Site
  - type: web
    name: engage-frontend
    runtime: static
    rootDir: frontend
    buildCommand: rm -rf dist node_modules/.vite node_modules/.cache && npm install --include=dev && npm run build 2>&1 && echo "Build complete" && ls -la dist/
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://capstonesoftware.co.uk/engage
      - key: VITE_APP_BASE
        value: /engage
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: engage-db
    plan: free
    databaseName: engage_production
    user: engage_user

# Deploy trigger: Sat Apr 11 08:59:19 BST 2026
