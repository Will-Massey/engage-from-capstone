# Render Blueprint for Engage by Capstone
# Deploy: https://dashboard.render.com/select-repo?type=blueprint

services:
  # Backend API Service
  - type: web
    name: engage-backend
    runtime: node
    plan: standard
    buildCommand: npm ci && cd shared && npm ci && npm run build && cd ../backend && npm ci && npm install typescript --save-dev && npx prisma generate && npx tsc
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: engage-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://engage-frontend.onrender.com
      - key: API_URL
        value: https://engage-backend.onrender.com
      - key: EMAIL_PROVIDER
        value: smtp
      - key: SMTP_HOST
        value: smtp.123-reg.co.uk
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM_NAME
        value: Engage by Capstone
      - key: EMAIL_FROM_ADDRESS
        value: sales@capstonesoftware.co.uk
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: UPLOAD_DIR
        value: uploads
      - key: COMPANIES_HOUSE_API_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
    autoDeploy: true

  # Frontend Static Site - Build from root but isolate frontend
  - type: web
    name: engage-frontend
    runtime: static
    buildCommand: |
      rm -rf node_modules && 
      cd shared && npm ci && npm run build && cd .. && 
      npm ci --include=dev && 
      cd frontend && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://engage-backend.onrender.com
    autoDeploy: true

databases:
  - name: engage-db
    plan: free
    databaseName: engage_production
    user: engage_user

