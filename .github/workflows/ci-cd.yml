# =============================================================================
# Unified CI/CD Pipeline for Engage
# =============================================================================
name: CI/CD

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to environment'
        required: true
        type: choice
        options: [development, staging, production]

env:
  NODE_VERSION: '20'
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================================================
  # CI JOBS
  # ==========================================================================
  
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
      
      - name: Type check
        run: npm run typecheck
      
      - name: Format check
        run: npm run format:check

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: engage_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['5432:5432']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma Client
        run: cd backend && npx prisma generate
      
      - name: Run migrations
        run: cd backend && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engage_test
      
      - name: Run tests
        # --forceExit: with REDIS_URL/DATABASE_URL set the singleton cache and
        # Prisma clients hold open sockets after the suite passes, so Jest can't
        # drain the event loop and the step hangs. Coverage is written first.
        run: cd backend && npm test -- --coverage --forceExit
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engage_test
          REDIS_URL: redis://localhost:6379

      - name: Frontend unit tests
        run: cd frontend && npx vitest run
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  e2e:
    name: E2E Tests (Playwright)
    needs: [lint, test]
    uses: ./.github/workflows/playwright-e2e.yml
    secrets: inherit

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint, test, e2e]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      backend_tag: ${{ steps.tags.outputs.backend }}
      frontend_tag: ${{ steps.tags.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate tags
        id: tags
        run: |
          SHA=${{ github.sha }}
          BRANCH=${{ github.ref_name }}
          echo "backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${SHA:0:7}" >> $GITHUB_OUTPUT
          echo "frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${SHA:0:7}" >> $GITHUB_OUTPUT
      
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend.optimized
          push: true
          tags: |
            ${{ steps.tags.outputs.backend }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend.optimized
          push: true
          tags: |
            ${{ steps.tags.outputs.frontend }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_APP_ENV=${{ github.ref_name }}

  # ==========================================================================
  # CD JOBS
  # ==========================================================================
  
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev.engage.capstonesoftware.co.uk
    steps:
      - name: Deploy to Railway
        uses: bencgreenberg/railway-deploy@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: engage-backend-dev
          image: ${{ needs.build.outputs.backend_tag }}
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_DEV }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.engage.capstonesoftware.co.uk
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Railway
        uses: bencgreenberg/railway-deploy@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: engage-backend-staging
          image: ${{ needs.build.outputs.backend_tag }}
      
      - name: Run migrations
        run: |
          echo "DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}" > .env
          npm ci
          cd backend && npx prisma migrate deploy
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
      
      - name: Health check
        run: |
          sleep 30
          curl -f https://staging.engage.capstonesoftware.co.uk/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://engage.capstonesoftware.co.uk
    steps:
      - uses: actions/checkout@v4
      
      - name: Backup database
        run: |
          pg_dump ${{ secrets.PROD_DATABASE_URL }} > backup-$(date +%Y%m%d-%H%M%S).sql
      
      - name: Deploy to Railway
        id: deploy
        uses: bencgreenberg/railway-deploy@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: engage-backend-prod
          image: ${{ needs.build.outputs.backend_tag }}
      
      - name: Run migrations
        run: |
          echo "DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}" > .env
          npm ci
          cd backend && npx prisma migrate deploy
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
          vercel-args: '--prod'
      
      - name: Health check
        run: |
          for i in {1..12}; do
            curl -f https://engage.capstonesoftware.co.uk/health && exit 0
            sleep 10
          done
          exit 1
      
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Production Deploy: ${{ job.status }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
