# =============================================================================
# Unified CI/CD Pipeline for Engage
#
# The ONLY deploy path: lint → test → e2e must be green on master, then this
# workflow triggers the Render deploys via API (autoDeploy is off in
# render.yaml). Red CI never deploys.
# =============================================================================
name: CI/CD

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================================================
  # CI JOBS
  # ==========================================================================

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # backend/frontend typecheck resolve @uk-proposal-platform/shared types
      # from shared/dist and @prisma/client from the generated client — build
      # them explicitly (a postinstall tsc used to do this, but running tsc
      # mid-install breaks Render's production npm ci).
      - name: Build shared
        run: npm run build:shared

      - name: Generate Prisma Client
        run: cd backend && npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: engage_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['5432:5432']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build:shared

      - name: Generate Prisma Client
        run: cd backend && npx prisma generate

      - name: Run migrations
        run: cd backend && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engage_test

      - name: Seed test database
        run: cd backend && npx tsx prisma/seed-enhanced.ts
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engage_test

      - name: Run unit tests with coverage
        # Smoke suites import the full app; collecting coverage on all src/**/*.ts
        # alongside them OOMs on the default ~4GB heap. Run smoke separately below.
        # --forceExit: singleton cache + Prisma hold open sockets after the suite.
        run: cd backend && npm test -- --coverage --forceExit --testPathIgnorePatterns=/smoke/
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engage_test
          REDIS_URL: redis://localhost:6379
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Run smoke tests
        # Each smoke file boots the full Express app. Run one file per jest process
        # (not test:integration + testPathPattern — that still discovers all smoke
        # files and OOM'd at 4GB). Cap heap at 6GB — 8192 exceeds the 7GB runner.
        run: |
          cd backend
          for spec in tests/smoke/*.test.ts; do
            echo "Smoke: $spec"
            npx jest "$spec" --forceExit --coverage=false --runInBand
          done
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engage_test
          # Omit REDIS_URL — after the coverage suite the service container is
          # often slow/offline; smoke only needs MemoryStore rate limiting.
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Frontend unit tests
        run: cd frontend && npx vitest run

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  e2e:
    name: E2E Tests (Playwright)
    needs: [lint, test]
    uses: ./.github/workflows/playwright-e2e.yml
    secrets: inherit

  # ==========================================================================
  # CD — single deploy path, gated on green CI
  # ==========================================================================

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [lint, test, e2e]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    environment:
      name: production
      url: https://capstonesoftware.co.uk/engage
    steps:
      - name: Pre-deploy Neon backup branch
        # Point-in-time safety net: snapshot the prod DB as a Neon branch
        # before the deploy (boot runs prisma migrate deploy). Skips with a
        # warning until NEON_API_KEY/NEON_PROJECT_ID secrets are set; once
        # configured, a failed backup blocks the deploy.
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          if [ -z "$NEON_API_KEY" ] || [ -z "$NEON_PROJECT_ID" ]; then
            echo "::warning::NEON_API_KEY/NEON_PROJECT_ID not set — skipping pre-deploy DB backup branch"
            exit 0
          fi
          NAME="pre-deploy-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA:0:7}"
          curl -sf -X POST "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"branch\": {\"name\": \"$NAME\"}}" > /dev/null
          echo "Created Neon backup branch: $NAME"
          # Prune: keep the 5 newest pre-deploy branches
          curl -sf "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            -H "Authorization: Bearer $NEON_API_KEY" \
          | jq -r '[.branches[] | select(.name | startswith("pre-deploy-"))] | sort_by(.created_at) | reverse | .[5:] | .[].id' \
          | while read -r BRANCH_ID; do
              echo "Pruning old backup branch $BRANCH_ID"
              curl -sf -X DELETE "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID" \
                -H "Authorization: Bearer $NEON_API_KEY" > /dev/null || echo "::warning::Failed to prune $BRANCH_ID"
            done

      - name: Deploy backend and wait until live
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
        run: |
          DEPLOY_ID=$(curl -sf -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}' | jq -r '.id')
          echo "Backend deploy: $DEPLOY_ID"
          for i in $(seq 1 60); do
            STATUS=$(curl -sf "https://api.render.com/v1/services/$SERVICE_ID/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer $RENDER_API_KEY" | jq -r '.status')
            echo "[$i] status: $STATUS"
            case "$STATUS" in
              live) exit 0 ;;
              build_failed|update_failed|canceled|deactivated) exit 1 ;;
            esac
            sleep 15
          done
          echo "Timed out waiting for backend deploy"; exit 1

      - name: Deploy frontend and wait until live
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_FRONTEND_SERVICE_ID }}
        run: |
          DEPLOY_ID=$(curl -sf -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "clear"}' | jq -r '.id')
          echo "Frontend deploy: $DEPLOY_ID"
          for i in $(seq 1 60); do
            STATUS=$(curl -sf "https://api.render.com/v1/services/$SERVICE_ID/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer $RENDER_API_KEY" | jq -r '.status')
            echo "[$i] status: $STATUS"
            case "$STATUS" in
              live) exit 0 ;;
              build_failed|update_failed|canceled|deactivated) exit 1 ;;
            esac
            sleep 15
          done
          echo "Timed out waiting for frontend deploy"; exit 1

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            curl -sf https://engage-backend-e1ue.onrender.com/health && exit 0
            sleep 10
          done
          echo "Backend health check failed after deploy"; exit 1
