# Reusable Playwright stack (shared by ci-cd.yml and e2e-scheduled.yml)
name: Playwright E2E

on:
  workflow_call:

jobs:
  playwright:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: engage_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['5432:5432']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install E2E dependencies
        run: cd e2e-tests && npm ci

      - name: Generate Prisma Client
        run: cd backend && npx prisma generate

      - name: Run migrations
        run: cd backend && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engage_test

      - name: Seed UK services
        run: cd backend && npx tsx prisma/seed-enhanced.ts
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engage_test

      - name: Build shared
        run: npm run build:shared

      - name: Build backend
        run: npm run build:backend

      - name: Build frontend
        run: npm run build:frontend

      - name: Install Playwright browsers
        run: cd e2e-tests && npx playwright install --with-deps chromium

      - name: Start backend
        run: cd backend && nohup npm start > backend-ci.log 2>&1 &
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engage_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci-only
          FRONTEND_URL: http://localhost:5173
          NODE_ENV: development

      - name: Start frontend
        run: cd frontend && nohup npx vite preview --port 5173 > frontend-ci.log 2>&1 &
        env:
          VITE_API_URL: http://localhost:3001

      - name: Wait for services
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:3001/ping && break
            sleep 1
          done
          for i in {1..30}; do
            curl -sf http://localhost:5173 && break
            sleep 1
          done

      - name: Run E2E tests
        run: cd e2e-tests && npx playwright test --project=chromium
        env:
          API_URL: http://localhost:3001/api
          TEST_USER_EMAIL: admin@demo.practice
          TEST_USER_PASSWORD: DemoPass123!

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-tests/playwright-report/
          retention-days: 7
