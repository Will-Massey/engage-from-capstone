# Reusable Playwright stack (shared by ci-cd.yml and e2e-scheduled.yml)
name: Playwright E2E

on:
  workflow_call:

jobs:
  playwright:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: engage_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['5432:5432']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install E2E dependencies
        run: cd e2e-tests && npm ci

      - name: Generate Prisma Client
        run: cd backend && npx prisma generate

      - name: Run migrations
        run: cd backend && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engage_test

      - name: Seed UK services
        run: cd backend && npx tsx prisma/seed-enhanced.ts
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engage_test

      - name: Build shared
        run: npm run build:shared

      - name: Build backend
        run: npm run build:backend

      - name: Build frontend
        run: npm run build:frontend
        env:
          # Build-time vars (Vite inlines them): serve at root in CI — the
          # /engage base only applies behind the production proxy — and use a
          # relative /api base so vite preview's proxy forwards to the backend
          # same-origin (httpOnly cookies stay first-party).
          VITE_APP_BASE: /
          VITE_API_URL: /api

      - name: Install Playwright browsers
        run: cd e2e-tests && npx playwright install --with-deps chromium

      - name: Start backend
        run: cd backend && nohup npm start > backend-ci.log 2>&1 &
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engage_test
          REDIS_URL: redis://localhost:6379
          # Must be >=32 chars — the env schema enforces this since the P0 hardening
          JWT_SECRET: test-jwt-secret-for-ci-only-0123456789abcdef
          FRONTEND_URL: http://localhost:5173
          NODE_ENV: development
          # No SMTP in CI — log emails instead of failing email-gated flows
          EMAIL_DEV_LOG: 'true'
          # Non-empty Stripe secret so the SDK client initialises (money-path uses
          # acct_e2e_stub Checkout + unsigned Connect webhook — no live Stripe calls)
          STRIPE_SECRET_KEY: sk_test_e2e_ci_placeholder_not_a_real_key_012345
          STRIPE_PUBLISHABLE_KEY: pk_test_e2e_ci_placeholder
          STRIPE_CONNECT_WEBHOOK_SECRET: whsec_e2e_ci_stub

      - name: Start frontend
        # VITE_* vars are baked in at build time above; nothing to set here.
        run: cd frontend && nohup npx vite preview --port 5173 > frontend-ci.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:3001/ping && break
            sleep 1
          done
          for i in {1..30}; do
            curl -sf http://localhost:5173 && break
            sleep 1
          done

      - name: Run E2E tests (core specs)
        run: cd e2e-tests && npx playwright test --project=chromium
        env:
          FRONTEND_URL: http://localhost:5173
          API_URL: http://localhost:3001/api
          TEST_USER_EMAIL: admin@demo.practice
          TEST_USER_PASSWORD: DemoPass123!

      - name: Run E2E tests (authenticated smoke suite)
        # The build config does a single global login and reuses the saved
        # storage state — the 8 smoke specs 401-cascade under the default config.
        run: cd e2e-tests && npx playwright test --config=playwright.build.config.ts --project=chromium
        env:
          FRONTEND_URL: http://localhost:5173
          # Direct backend for page.request helpers (vite preview /api proxy is flaky in CI)
          API_URL: http://localhost:3001/api
          TEST_USER_EMAIL: admin@demo.practice
          TEST_USER_PASSWORD: DemoPass123!

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e-tests/playwright-report/
            e2e-tests/playwright-report-build/
          retention-days: 7

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            backend/backend-ci.log
            frontend/frontend-ci.log
          retention-days: 7
