name: Deploy to Render

on:
  push:
    branches: [master, main]
  workflow_dispatch:  # Manual trigger

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
        run: |
          echo "🚀 Triggering backend deploy..."
          curl -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
          echo "✅ Backend deploy triggered"

  deploy-frontend:
    name: Deploy Frontend  
    runs-on: ubuntu-latest
    needs: deploy-backend  # Wait for backend first
    steps:
      - name: Deploy Frontend to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_FRONTEND_SERVICE_ID }}
        run: |
          echo "🚀 Triggering frontend deploy..."
          curl -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'
          echo "✅ Frontend deploy triggered"

  notify:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Deployment Summary
        run: |
          echo "✅ All services deployed!"
          echo "Backend: https://engage-backend-e1ue.onrender.com"
          echo "Frontend: https://engage-frontend-0g6u.onrender.com"
