# =============================================================================
# PNPM Workspace Configuration
# =============================================================================
packages:
  - 'backend'
  - 'frontend'
  - 'shared'

# Shared dependencies across all packages
sharedWorkspaceLockfile: true

# Link workspace packages
linkWorkspacePackages: true

# Hoist settings for better compatibility
hoistPattern:
  - '*eslint*'
  - '*prettier*'
  - '*typescript*'
  - '@types/*'

# Public hoist pattern for commonly used packages
publicHoistPattern:
  - '*eslint*'
  - '*prettier*'
  - '*typescript*'
  - '@types/*'
  - 'tailwindcss'
  - 'postcss'
  - 'autoprefixer'
